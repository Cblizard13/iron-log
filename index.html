// RENDER
// ═══════════════════════════════════════════════════════════
function render(){renderHeader();renderMain()}

function renderHeader(){
  const meta=currentMeta(),C=meta.color;
  document.getElementById('logo-text').style.color=C;
  // week buttons
  ['A','B'].forEach(w=>{
    const btn=document.getElementById('wk-'+w.toLowerCase());
    if(!btn)return;
    btn.classList.toggle('active',state.activeWeek===w);
    btn.style.background=state.activeWeek===w?C:'#1a1a1a';
    btn.style.borderColor=state.activeWeek===w?C:'#2a2a2a';
    btn.style.color=state.activeWeek===w?'#000':'#555';
  });
  // day bar
  document.getElementById('day-bar').innerHTML=DAYS.map(d=>{
    const m=PLAN_META[d.type];const on=d.id===state.activeDay;
    return`<button class="day-btn${on?' active':''}" onclick="switchDay('${d.id}')" style="${on?`background:${m.color};border-color:${m.color};`:''}">${d.label}</button>`;
  }).join('');
  document.querySelectorAll('.nav-tab').forEach((b,i)=>b.classList.toggle('active',['workout','library','history'][i]===state.view));
}

function renderMain(){
  const main=document.getElementById('main');
  if(state.view==='workout')     main.innerHTML=renderWorkout();
  else if(state.view==='library')main.innerHTML=state.libDetail?renderExDetail():renderLibrary();
  else                           main.innerHTML=renderHistory();
}

// ── WORKOUT ──
function renderWorkout(){
  const meta=currentMeta(),C=meta.color;
  const routine=currentRoutine();
  const tot=totalSets(),done=doneCount(),pct=progress();
  let sessionHtml='';
  if(state.sessionState==='idle'){
    sessionHtml=`
      <button class="btn-start" style="background:${C};box-shadow:0 0 20px ${C}44" onclick="startSession()">▶&nbsp;&nbsp;START WORKOUT</button>
      <button class="btn-edit" style="border-color:${state.editMode?C:'#2a2a2a'};color:${state.editMode?C:'#555'}" onclick="state.editMode=!state.editMode;render()">
        ${state.editMode?'✓&nbsp;&nbsp;DONE EDITING':'✏️&nbsp;&nbsp;EDIT ROUTINE'}
      </button>`;
  }else if(state.sessionState==='active'){
    sessionHtml=`<div class="session-active" style="border:1px solid ${C}44;box-shadow:0 0 14px ${C}22">
      <div><div class="timer-label">● SESSION ACTIVE</div>
      <div class="timer-display timer-live" id="timer-val" style="color:${C}">${fmtTime(state.elapsed)}</div></div>
      <div style="display:flex;flex-direction:column;gap:5px;align-items:flex-end">
        <button class="btn-finish" style="color:${C};border-color:${C}" onclick="finishSession()">■&nbsp;FINISH</button>
        <button onclick="openPlateCalc()" style="padding:5px 10px;background:transparent;border:1px solid #333;border-radius:3px;color:#666;font-family:'DM Mono',monospace;font-size:9px;letter-spacing:1px;cursor:pointer">🔧 PLATES</button>
      </div>
    </div>`;
  }else{
    sessionHtml=`<div class="session-done" style="border:1px solid ${C}55">
      <h3 style="color:${C}">🔥 SESSION COMPLETE</h3>
      <p>DURATION: ${fmtTime(state.finishedTime)}&nbsp;·&nbsp;${done}/${tot} SETS</p>
      <button class="btn-reset" onclick="resetSession();render()">↺&nbsp;&nbsp;NEW SESSION</button>
    </div>`;
  }
  const locked=state.sessionState==='idle'&&!state.editMode;
  const exCards=routine.map((ex,xi)=>renderExCard(ex,xi,C)).join('');
  const addBtn=state.editMode?`<button class="add-to-routine-btn" onclick="openAddToRoutineModal()">＋&nbsp;&nbsp;ADD EXERCISE TO ROUTINE</button>`:'';
  return`<div class="day-label" style="color:${C}"><h2>WEEK ${state.activeWeek} · ${meta.label}</h2><p>${meta.focus.toUpperCase()}</p></div>
    ${sessionHtml}
    <div class="progress-wrap">
      <div class="progress-labels"><span style="color:var(--muted)">PROGRESS</span><span style="color:${C}">${done}/${tot} · ${pct}%</span></div>
      <div class="progress-track"><div class="progress-fill" style="width:${pct}%;background:${C}"></div></div>
    </div>
    <div class="exercises-wrap${locked?' locked':''}" id="ex-wrap" ontouchmove="onTouchDragMove(event)" ontouchend="onTouchDragEnd(event)">
      ${exCards}${addBtn}
    </div>`;
}

function renderExCard(ex,xi,C){
  const open=state.expandedEx===ex.id;
  const doneS=Array.from({length:ex.sets},(_,i)=>i).filter(i=>state.completedSets[`${ex.id}-${i}`]).length;
  const note=getNotes()[ex.id]||'';
  const goal=getGoals()[ex.id]||'';
  const isLogging=state.sessionState==='active'||state.sessionState==='finished';
  const W=state.activeWeek,D=state.activeDay,T=currentType();
  const activeTab=open?getActiveTab(ex.id):'sets';

  let body='';
  if(open){
    // TABS
    const tabs=['sets','history','notes'].map(t=>{
      const lbl=t==='sets'?'SETS':t==='history'?'HISTORY':'NOTES';
      return`<button class="ex-tab${activeTab===t?' active':''}" style="${activeTab===t?`border-bottom-color:${C};color:${C}`:''}" onclick="switchExTab('${ex.id}','${t}')">${lbl}</button>`;
    }).join('');
    body+=`<div class="ex-tabs">${tabs}</div>`;

    if(activeTab==='sets'){
      if(isLogging){
        const hist=getHistory(W,D,ex.id);
        const prev=hist[0]?.sets||{};
        const rows=Array.from({length:ex.sets},(_,i)=>{
          const log=getLog(W,D,ex.id,i);const d=!!state.completedSets[`${ex.id}-${i}`];
          return`<div class="set-row${d?' done':''}">
            <div class="set-num" style="${d?`color:${C}`:''}">${i+1}</div>
            <div class="set-prev">${prev[i]?.weight&&prev[i]?.reps?`${prev[i].weight}×${prev[i].reps}`:'—'}</div>
            <input class="set-input" type="number" inputmode="decimal" placeholder="0" value="${log.weight}" style="${d?`border-color:${C}33`:''}" onchange="saveLog('${W}','${D}','${ex.id}',${i},'weight',this.value)">
            <input class="set-input" type="number" inputmode="decimal" placeholder="${ex.reps}" value="${log.reps}" style="${d?`border-color:${C}33`:''}" onchange="saveLog('${W}','${D}','${ex.id}',${i},'reps',this.value)">
            <button class="set-check${d?' checked':''}" style="color:${C}" onclick="toggleSet('${ex.id}',${i})"><span style="${d?'color:#000':''}">✓</span></button>
          </div>`;
        }).join('');
        const histLine=hist.length>0?`<div class="ex-history">LAST: ${hist[0].date} · ${Object.values(hist[0].sets).filter(s=>s.weight).map(s=>`${s.weight}×${s.reps}`).join(' / ')}</div>`:'';
        body+=`<div class="sets-container">
          <div class="sets-header"><span>SET</span><span>PREV</span><span>LBS</span><span>${ex.reps===60?'SECS':'REPS'}</span><span>✓</span></div>
          ${rows}${histLine}
        </div>
        <div style="padding:8px 12px;background:#0e0e0e;border-top:1px solid #141414;display:flex;align-items:center;gap:8px">
          <span style="font-family:'DM Mono',monospace;font-size:9px;color:#444;letter-spacing:1.5px;white-space:nowrap">🎯 GOAL</span>
          <input type="number" inputmode="decimal" placeholder="LBS" value="${goal}"
            style="background:#1a1a1a;border:1px solid ${goal?C+'55':'#2a2a2a'};color:${goal?C:'#aaa'};padding:5px 8px;font-family:'DM Mono',monospace;font-size:12px;border-radius:3px;outline:none;text-align:center;width:80px;transition:border-color .2s"
            onchange="saveGoal('${ex.id}',this.value?parseFloat(this.value):'');render()">
          ${goal?`<span style="font-family:'DM Mono',monospace;font-size:10px;color:${C};letter-spacing:1px">${goal} LBS</span>
          <button onclick="openPlateCalc(${goal})" style="margin-left:auto;padding:5px 9px;background:transparent;border:1px solid #333;border-radius:3px;color:#666;font-family:'DM Mono',monospace;font-size:9px;cursor:pointer;letter-spacing:1px">🔧 PLATES</button>`
          :`<span style="font-family:'DM Mono',monospace;font-size:9px;color:#333;letter-spacing:1px">NOT SET</span>`}
        </div>`;      } else {
        // edit mode sets tab
        body+=`<div class="ex-config-wrap">
          <div class="ex-config-row">
            <div class="ex-config-field">
              <div class="ex-config-label">SETS</div>
              <div style="display:flex;align-items:center;gap:5px;margin-top:2px">
                <button onclick="removeSet('${W}','${T}',${xi})" style="width:28px;height:28px;background:#1a1a1a;border:1px solid #333;color:#aaa;border-radius:3px;cursor:pointer;font-size:16px;line-height:1">−</button>
                <span style="font-family:'DM Mono',monospace;font-size:17px;min-width:22px;text-align:center">${ex.sets}</span>
                <button onclick="addSet('${W}','${T}',${xi})" style="width:28px;height:28px;background:#1a1a1a;border:1px solid #333;color:#aaa;border-radius:3px;cursor:pointer;font-size:16px;line-height:1">+</button>
              </div>
            </div>
            <div class="ex-config-field">
              <div class="ex-config-label">DEFAULT REPS</div>
              <input class="ex-config-input" type="number" inputmode="numeric" value="${ex.reps}" onchange="updateExConfig('${W}','${T}',${xi},'reps',parseInt(this.value)||10)">
            </div>
          </div>
          <div class="ex-config-field">
            <div class="ex-config-label">🎯 GOAL WEIGHT (LBS)</div>
            <div style="display:flex;gap:5px;margin-top:2px">
              <input class="ex-config-input" type="number" inputmode="decimal" placeholder="e.g. 225" value="${goal}" onchange="saveGoal('${ex.id}',this.value?parseFloat(this.value):'')">
              ${goal?`<button onclick="openPlateCalc(${goal})" style="padding:7px 9px;background:#1a1a1a;border:1px solid #333;color:#888;border-radius:3px;cursor:pointer;font-family:'DM Mono',monospace;font-size:10px;white-space:nowrap">🔧</button>`:''}
            </div>
          </div>
        </div>`;
      }
    }else if(activeTab==='history'){
      const hist=getAllHistoryForEx(ex.id);
      if(!hist.length){
        body+=`<div class="ex-hist-empty">NO HISTORY YET</div>`;
      }else{
        body+=`<div>`;
        hist.forEach(h=>{
          const sets=Object.values(h.sets).filter(s=>s.weight||s.reps);
          body+=`<div class="ex-hist-item">
            <div class="ex-hist-date">WK ${h.week} · ${h.date}</div>
            <div class="ex-hist-sets">${sets.map((s,i)=>`<span>Set ${i+1}: ${s.weight||'—'}lbs × ${s.reps||'—'}</span>`).join('')}</div>
          </div>`;
        });
        body+=`</div>`;
      }
    }else{
      // notes tab
      body+=`<div class="ex-config-wrap">
        <div>
          <div class="ex-config-label" style="margin-bottom:5px">📝 NOTES</div>
          <textarea class="ex-notes-input" rows="3" placeholder="Form cues, weight targets, reminders..." onchange="saveNote('${ex.id}',this.value)">${note}</textarea>
        </div>
      </div>`;
    }
  }

  const showActions=state.editMode||(isLogging);
  return`<div class="ex-card" id="exc-${ex.id}" style="${open?`border-color:${C}33`:''}"
      draggable="true" ondragstart="onDragStart(event,${xi})" ondragover="onDragOver(event,${xi})"
      ondrop="onDrop(event,${xi})" ondragend="onDragEnd()">
    <div class="ex-header">
      <div class="drag-handle" ontouchstart="onTouchDragStart(event,${xi})" style="touch-action:none">⠿</div>
      <div class="ex-header-content" onclick="toggleExpand('${ex.id}')">
        <div class="ex-name-row">
          <span class="ex-icon">${eqIcon(ex.eq)}</span>
          <span class="ex-name">${ex.name.toUpperCase()}</span>
        </div>
        <div class="ex-equip">${ex.eq.toUpperCase()}${goal?`&nbsp;·&nbsp;<span style="color:${C}">🎯${goal}LBS</span>`:''}</div>
      </div>
      <div class="ex-meta">
        <div class="ex-actions">
          ${showActions?`<button class="ex-action-btn" style="color:${C};border-color:${C}33" onclick="openSwapModal('${W}','${T}',${xi})">SWAP</button>`:''}
          ${state.editMode?`<button class="ex-remove-btn" onclick="removeExercise('${W}','${T}',${xi})" title="Remove">✕</button>`:''}
          <div class="ex-count" style="${doneS===ex.sets?`color:${C}`:''}"> ${doneS}/${ex.sets}</div>
        </div>
        <div class="ex-chevron" onclick="toggleExpand('${ex.id}')">${open?'▲':'▼'}</div>
      </div>
    </div>
    ${body}
  </div>`;
}

// ── LIBRARY ──
function renderLibrary(){
  const meta=currentMeta(),C=meta.color;
  const customs=getCustomExercises();
  let html=`<div class="day-label" style="color:${C}"><h2>EXERCISE LIBRARY</h2><p>TAP ANY EXERCISE FOR DETAILS</p></div>`;
  ['push','pull','legs'].forEach(cat=>{
    const lib=LIBRARY[cat];
    html+=`<div class="lib-category">
      <div class="lib-cat-header"><div class="lib-cat-dot" style="background:${lib.color}"></div><div class="lib-cat-title" style="color:${lib.color}">${lib.label}</div></div>`;
    Object.entries(lib.groups).forEach(([muscle,exercises])=>{
      html+=`<div class="lib-muscle-group"><div class="lib-muscle-label">${muscle}</div>`;
      exercises.forEach(ex=>{
        html+=`<div class="lib-ex-item" onclick="openExDetail('${ex.name.replace(/'/g,"\\'")}','${cat}')">
          <div class="lib-ex-left">
            <div class="lib-ex-name">${eqIcon(ex.eq)}&nbsp;${ex.name}</div>
            <div class="lib-ex-eq">${ex.eq.toUpperCase()}</div>
          </div>
          <div style="display:flex;align-items:center">
            <span class="lib-ex-tag" style="background:${lib.color}22;color:${lib.color}">${cat.toUpperCase()}</span>
            <span class="lib-ex-arrow">›</span>
          </div>
        </div>`;
      });
      customs.filter(e=>e.cat===cat&&e.muscle===muscle).forEach(ex=>{
        html+=`<div class="lib-ex-item" style="cursor:default">
          <div class="lib-ex-left">
            <div class="lib-ex-name" style="display:flex;align-items:center">${eqIcon(ex.eq)}&nbsp;${ex.name}<span class="custom-badge">CUSTOM</span></div>
            <div class="lib-ex-eq">${ex.eq.toUpperCase()}</div>
          </div>
          <div style="display:flex;align-items:center;gap:5px">
            <span class="lib-ex-tag" style="background:${lib.color}22;color:${lib.color}">${cat.toUpperCase()}</span>
            <button class="lib-ex-delete" onclick="confirmDeleteCustom('${ex.id}')">✕</button>
          </div>
        </div>`;
      });
      html+='</div>';
    });
    const other=customs.filter(e=>e.cat===cat&&!Object.keys(lib.groups).includes(e.muscle));
    if(other.length){
      html+=`<div class="lib-muscle-group"><div class="lib-muscle-label">CUSTOM</div>`;
      other.forEach(ex=>{html+=`<div class="lib-ex-item" style="cursor:default">
        <div class="lib-ex-left"><div class="lib-ex-name" style="display:flex;align-items:center">${eqIcon(ex.eq)}&nbsp;${ex.name}<span class="custom-badge">CUSTOM</span></div><div class="lib-ex-eq">${ex.eq.toUpperCase()}</div></div>
        <div style="display:flex;align-items:center;gap:5px"><span class="lib-ex-tag" style="background:${lib.color}22;color:${lib.color}">${cat.toUpperCase()}</span><button class="lib-ex-delete" onclick="confirmDeleteCustom('${ex.id}')">✕</button></div>
      </div>`;});
      html+='</div>';
    }
    html+=`<button class="lib-add-btn" onclick="openAddExModal('${cat}')">＋&nbsp;&nbsp;ADD ${lib.label} EXERCISE</button></div>`;
  });
  return html;
}

  const allHist=getAllHistoryForEx(ex.id);

  // emoji by equipment
  const emo=ex.eq.includes('Leg Extension')?'🦵':ex.eq.includes('Preacher')?'💺':ex.eq.includes('Rack')?'🏗️':ex.eq.includes('Barbell')?'🏋️':ex.eq.includes('Dumbbell')?'💪':ex.eq.includes('Pulldown')?'🔗':ex.eq.includes('Bench')?'🪑':'⚡';

  const stepsHtml=ex.steps?`<ol class="detail-steps">${ex.steps.map((s,i)=>`<li class="detail-step" style="color:${C}"><span class="detail-step-num">${i+1}.</span><span style="color:#aaa">${s}</span></li>`).join('')}</ol>`:'<div class="detail-desc">No steps available.</div>';

  const pbHtml=pb.bestWeight>0?`
    <div class="pb-row"><div class="pb-label">BEST WEIGHT</div><div class="pb-value" style="color:${C}">${pb.bestWeight} LBS</div></div>
    <div class="pb-row"><div class="pb-label">BEST VOLUME (SINGLE SET)</div><div class="pb-value" style="color:${C}">${pb.bestVol} LBS</div></div>
    <div class="pb-row" style="border:none"><div class="pb-label">DATE ACHIEVED</div><div class="pb-value">${pb.bestDate}</div></div>
  `:`<div style="font-family:'DM Mono',monospace;font-size:10px;color:#333;text-align:center;padding:12px;letter-spacing:2px">NO PERSONAL BESTS YET</div>`;

  const histHtml=allHist.length?allHist.slice(0,15).map(h=>{
    const sets=Object.values(h.sets).filter(s=>s.weight||s.reps);
    return`<div class="detail-hist-item">
      <div class="detail-hist-date">WK ${h.week} · ${h.date}</div>
      <div class="detail-hist-sets">${sets.map((s,i)=>`<span>Set ${i+1}: ${s.weight||'—'}lbs × ${s.reps||'—'}</span>`).join('')}</div>
    </div>`;
  }).join(''):`<div style="font-family:'DM Mono',monospace;font-size:10px;color:#333;text-align:center;padding:12px;letter-spacing:2px">NO HISTORY YET</div>`;

  const ytQuery=encodeURIComponent(name+' proper form technique');
  const ytUrl=`https://www.youtube.com/results?search_query=${ytQuery}`;

  const diagramHtml=MUSCLE_MAP[ex.id]?buildMuscleSVG(ex.id,C):'';

  return`
    <div class="detail-back" onclick="closeExDetail()">‹&nbsp;&nbsp;BACK TO LIBRARY</div>
    <div class="detail-hero">
      <div class="detail-name">${name.toUpperCase()}</div>
      <div class="detail-meta-row">
        <span class="detail-tag" style="background:${C}22;color:${C}">${cat.toUpperCase()}</span>
        <span class="detail-tag" style="background:#ffffff0d;color:#888">${ex.eq.toUpperCase()}</span>
      </div>
      ${ex.desc?`<div style="font-family:'DM Mono',monospace;font-size:11px;color:#aaa;line-height:1.6;letter-spacing:.5px;margin-top:8px">${ex.desc}</div>`:''}
    </div>

    <div class="detail-section">
      <div class="detail-section-title" style="color:${C}">💪&nbsp;MUSCLE DIAGRAM</div>
      ${diagramHtml||`<div style="font-family:'DM Mono',monospace;font-size:10px;color:#333;text-align:center;padding:12px;letter-spacing:2px">NO DIAGRAM AVAILABLE</div>`}
    </div>

    <div class="detail-section">
      <div class="detail-section-title" style="color:${C}">🎬&nbsp;VIDEO DEMO</div>
      <a href="${ytUrl}" target="_blank" rel="noopener noreferrer" style="display:flex;align-items:center;justify-content:center;gap:10px;padding:14px;background:#1a1a1a;border:1px solid #ff000044;border-radius:6px;text-decoration:none;transition:background .15s" ontouchstart="this.style.background='#221010'" ontouchend="this.style.background='#1a1a1a'">
        <svg viewBox="0 0 24 24" width="28" height="28" fill="#ff0000"><path d="M23.5 6.2a3 3 0 0 0-2.1-2.1C19.5 3.6 12 3.6 12 3.6s-7.5 0-9.4.5A3 3 0 0 0 .5 6.2 31 31 0 0 0 0 12a31 31 0 0 0 .5 5.8 3 3 0 0 0 2.1 2.1c1.9.5 9.4.5 9.4.5s7.5 0 9.4-.5a3 3 0 0 0 2.1-2.1A31 31 0 0 0 24 12a31 31 0 0 0-.5-5.8z"/><path d="M9.8 15.4V8.6l6.2 3.4-6.2 3.4z" fill="#fff"/></svg>
        <div>
          <div style="font-size:15px;color:#fff;letter-spacing:2px">WATCH ON YOUTUBE</div>
          <div style="font-family:'DM Mono',monospace;font-size:9px;color:#666;letter-spacing:1px;margin-top:2px">${name.toUpperCase()} FORM &amp; TECHNIQUE</div>
        </div>
      </a>
    </div>

    <div class="detail-section">
      <div class="detail-section-title" style="color:${C}">📋&nbsp;HOW TO PERFORM</div>
      ${stepsHtml}
    </div>
    <div class="detail-section">
      <div class="detail-section-title" style="color:${C}">🏆&nbsp;PERSONAL BESTS</div>
      ${pbHtml}
    </div>
    <div class="detail-section">
      <div class="detail-section-title" style="color:${C}">📅&nbsp;HISTORY</div>
      ${histHtml}
    </div>`;
}

// ── HISTORY VIEW ──
function renderHistory(){
  const meta=currentMeta(),C=meta.color;
  const day=currentDayObj();
  const routine=currentRoutine();
  const logs=getLogs();
  const dl=logs[state.activeWeek]?.[state.activeDay]||{};
  const dates=Object.keys(dl).sort((a,b)=>b.localeCompare(a));
  const sessions=dates.length===0
    ?`<div class="empty-state">NO SESSIONS LOGGED YET</div>`
    :dates.map(date=>{
      const exRows=routine.map(ex=>{
        const ed=dl[date]?.[ex.id];if(!ed)return'';
        const sets=Object.values(ed).filter(s=>s.weight||s.reps);if(!sets.length)return'';
        return`<div class="history-ex">
          <div class="history-ex-name">${ex.name.toUpperCase()}</div>
          <div class="history-sets">${sets.map((s,i)=>`<span>Set ${i+1}: ${s.weight?s.weight+'lbs':'—'} × ${s.reps||'—'}</span>`).join('')}</div>
        </div>`;
      }).join('');
      if(!exRows.trim())return'';
      return`<div class="history-session"><div class="history-date" style="color:${C}">WEEK ${state.activeWeek} · ${date}</div>${exRows}</div>`;
    }).filter(Boolean).join('');
  return`<div class="day-label" style="color:${C}"><h2>${day.name.toUpperCase()} HISTORY</h2><p>WEEK ${state.activeWeek} · ${meta.focus.toUpperCase()}</p></div>${sessions}`;
}

let deferredPrompt=null;

function installApp(){if(!deferredPrompt)return;deferredPrompt.prompt();deferredPrompt.userChoice.then(()=>{deferredPrompt=null;document.getElementById('install-banner').style.display='none'})}
function showIOSHint(){const isIOS=/iphone|ipad|ipod/i.test(navigator.userAgent);const isSafari=/^((?!chrome|android).)*safari/i.test(navigator.userAgent);if(isIOS&&isSafari&&!window.navigator.standalone&&!localStorage.getItem('il_ios')){const b=document.getElementById('install-banner');b.style.display='flex';b.innerHTML=`<p><strong>Install Iron Log</strong><br>Tap <strong>Share ↑</strong> then <strong>"Add to Home Screen"</strong></p><button class="install-dismiss" onclick="localStorage.setItem('il_ios','1');document.getElementById('install-banner').style.display='none'">✕</button>`;}}
const SW_CODE=`const C='il-v4',A=[self.location.href];self.addEventListener('install',e=>{e.waitUntil(caches.open(C).then(c=>c.addAll(A)).then(()=>self.skipWaiting()))});self.addEventListener('activate',e=>{e.waitUntil(caches.keys().then(ks=>Promise.all(ks.filter(k=>k!==C).map(k=>caches.delete(k)))).then(()=>self.clients.claim()))});self.addEventListener('fetch',e=>{e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request).then(res=>{const cl=res.clone();caches.open(C).then(c=>c.put(e.request,cl));return res}).catch(()=>caches.match(e.request))))});`;
if('serviceWorker' in navigator){navigator.serviceWorker.register(URL.createObjectURL(new Blob([SW_CODE],{type:'application/javascript'})),{scope:'/'}).catch(()=>{})}
function generateIcon(size){const cv=document.createElement('canvas');cv.width=cv.height=size;const ctx=cv.getContext('2d'),r=size*.18;ctx.beginPath();ctx.moveTo(r,0);ctx.lineTo(size-r,0);ctx.quadraticCurveTo(size,0,size,r);ctx.lineTo(size,size-r);ctx.quadraticCurveTo(size,size,size-r,size);ctx.lineTo(r,size);ctx.quadraticCurveTo(0,size,0,size-r);ctx.lineTo(0,r);ctx.quadraticCurveTo(0,0,r,0);ctx.closePath();ctx.fillStyle='#0a0a0a';ctx.fill();const cx=size/2,cy=size/2,s=size/3.5;ctx.strokeStyle='#FF4500';ctx.lineWidth=size*.07;ctx.lineCap='round';ctx.beginPath();ctx.moveTo(cx-s,cy);ctx.lineTo(cx+s,cy);ctx.stroke();ctx.lineWidth=size*.18;ctx.beginPath();ctx.moveTo(cx-s*.72,cy-s*.28);ctx.lineTo(cx-s*.72,cy+s*.28);ctx.stroke();ctx.beginPath();ctx.moveTo(cx+s*.72,cy-s*.28);ctx.lineTo(cx+s*.72,cy+s*.28);ctx.stroke();ctx.fillStyle='#FF4500';ctx.beginPath();ctx.arc(cx-s*.45,cy,size*.04,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(cx+s*.45,cy,size*.04,0,Math.PI*2);ctx.fill();return cv.toDataURL('image/png')}
function injectManifest(){const i192=generateIcon(192),i512=generateIcon(512);const manifest={name:'Iron Log',short_name:'Iron Log',description:'Push/Pull/Legs tracker',start_url:window.location.href,display:'standalone',background_color:'#0a0a0a',theme_color:'#0a0a0a',orientation:'portrait',icons:[{src:i192,sizes:'192x192',type:'image/png',purpose:'any maskable'},{src:i512,sizes:'512x512',type:'image/png',purpose:'any maskable'}]};const lnk=document.createElement('link');lnk.rel='manifest';lnk.href=URL.createObjectURL(new Blob([JSON.stringify(manifest)],{type:'application/manifest+json'}));document.head.appendChild(lnk)}
document.getElementById('ati').href=generateIcon(180);
injectManifest();render();setTimeout(showIOSHint,2000);
